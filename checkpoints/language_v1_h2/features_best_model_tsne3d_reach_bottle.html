<script>
(function() {
  var thumbs = window.UMAP_THUMBS || {};

  var overlay = document.createElement('div');
  overlay.style.cssText = [
    'position:fixed', 'pointer-events:none', 'z-index:9999',
    'display:none', 'background:#ffffff', 'border:1px solid #cccccc',
    'border-radius:6px', 'padding:4px', 'box-shadow:0 2px 12px rgba(0,0,0,0.18)'
  ].join(';');
  document.body.appendChild(overlay);

  // Hover focus: light veil over the plot fades all points; a dark-outlined
  // DOM dot replica marks the hovered one. No Plotly redraws involved.
  var dimmer = document.createElement('div');
  dimmer.style.cssText = [
    'position:fixed', 'pointer-events:none', 'z-index:9997',
    'display:none', 'background:rgba(247,247,249,0.75)'
  ].join(';');
  document.body.appendChild(dimmer);

  var DOT_R = 5;
  var dot = document.createElement('div');
  dot.style.cssText = [
    'position:fixed', 'pointer-events:none', 'z-index:9998',
    'display:none', 'width:' + (DOT_R*2) + 'px', 'height:' + (DOT_R*2) + 'px',
    'border-radius:50%', 'background:#ffffff',
    'border:1.5px solid rgba(34,34,34,0.85)'
  ].join(';');
  document.body.appendChild(dot);

  var mouseX = 0, mouseY = 0;

  function placeOverlay() {
    var ow = overlay.offsetWidth  || 0;
    var oh = overlay.offsetHeight || 0;
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var left = mouseX + 18;
    var top  = mouseY - 10;
    if (left + ow > vw - 8) left = mouseX - ow - 10;
    if (top  + oh > vh - 8) top  = vh - oh - 8;
    if (left < 8) left = 8;
    if (top  < 8) top  = 8;
    overlay.style.left = left + 'px';
    overlay.style.top  = top  + 'px';
  }

  document.addEventListener('mousemove', function(e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
    if (overlay.style.display !== 'none') placeOverlay();
  });

  var TAC_H = 3;
  var THUMB_W = 96;

  var plotDiv = document.getElementById('umap_plot');
  plotDiv.on('plotly_hover', function(eventData) {
    var pt = eventData.points[0];
    if (!pt || !pt.customdata) { overlay.style.display='none'; return; }
    var ep   = pt.customdata[0];
    var fr   = pt.customdata[1];
    var meta = pt.customdata[2] || '';

    // RGB
    var rgbB64 = thumbs[ep + '_' + fr];
    var rgbHtml = rgbB64
      ? '<img src="data:image/jpeg;base64,' + rgbB64 + '" width="' + THUMB_W + '" style="display:block;border-radius:3px;"/>'
      : '';

    // Tactile history strips
    function tacStrip(suffix) {
      var imgs = '';
      for (var f = Math.max(0, fr - TAC_H + 1); f <= fr; f++) {
        var b64 = thumbs[ep + '_' + f + '_' + suffix];
        if (b64) {
          imgs += '<img src="data:image/jpeg;base64,' + b64 + '" width="' + THUMB_W + '" style="border-radius:2px;"/>';
        } else {
          imgs += '<div style="width:' + THUMB_W + 'px;height:' + Math.round(THUMB_W*1.33) + 'px;background:#e2e2e8;border-radius:2px;display:inline-block;"></div>';
        }
      }
      return '<div style="display:flex;gap:2px;margin-top:4px;">' + imgs + '</div>';
    }

    overlay.innerHTML = (
      rgbHtml +
      tacStrip('tac1') +
      tacStrip('tac2') +
      '<div style="font:12px/1.5 Roboto,sans-serif;color:#222222;margin-top:6px;">' + meta + '</div>'
    );
    overlay.style.display = 'block';
    placeOverlay();

    // Fade all other points: dark veil over the plot, bright dot replica
    // of the hovered point on top (pure DOM — no Plotly redraw).
    var rect = plotDiv.getBoundingClientRect();
    dimmer.style.left   = rect.left + 'px';
    dimmer.style.top    = rect.top + 'px';
    dimmer.style.width  = rect.width + 'px';
    dimmer.style.height = rect.height + 'px';
    dimmer.style.display = 'block';

    var cx = mouseX, cy = mouseY;
    if (pt.bbox) {
      cx = rect.left + (pt.bbox.x0 + pt.bbox.x1) / 2;
      cy = rect.top  + (pt.bbox.y0 + pt.bbox.y1) / 2;
    }
    // Read the applied marker color from _fullData (kept current by restyle;
    // numeric arrays may be TypedArrays there, so don't use Array.isArray).
    var fd = (plotDiv._fullData && plotDiv._fullData[pt.curveNumber]) || {};
    var td = plotDiv.data[pt.curveNumber] || {};
    var mc = (fd.marker && fd.marker.color) || (td.marker && td.marker.color);
    var c  = '#ffffff';
    if (typeof mc === 'string') {
      c = mc;                                  // task mode: one color per trace
    } else if (mc && typeof mc.length === 'number') {
      var v = mc[pt.pointNumber];
      if (typeof v === 'string') c = v;        // active/terminal: per-point strings
      else if (typeof v === 'number') c = progColor(v);  // progress: value → colorscale
    }
    dot.style.background = c;
    dot.style.display = 'block';
    dot.style.left = (cx - DOT_R) + 'px';
    dot.style.top  = (cy - DOT_R) + 'px';
  });

  // Interpolate the progress colorscale (same stops as the Python side)
  var PROG_CS = [[0.0, "#1a3cff"], [0.25, "#6699ff"], [0.5, "#cccccc"], [0.75, "#ff6644"], [1.0, "#cc1100"]].map(function(s) {
    var hex = s[1].replace('#','');
    var rgb = [parseInt(hex.slice(0,2),16), parseInt(hex.slice(2,4),16), parseInt(hex.slice(4,6),16)];
    return [s[0], rgb];
  });
  function progColor(v) {
    v = Math.max(0, Math.min(1, v));
    for (var i = 1; i < PROG_CS.length; i++) {
      if (v <= PROG_CS[i][0]) {
        var t = (v - PROG_CS[i-1][0]) / (PROG_CS[i][0] - PROG_CS[i-1][0] || 1);
        var a = PROG_CS[i-1][1], b = PROG_CS[i][1];
        return 'rgb(' + Math.round(a[0]+(b[0]-a[0])*t) + ',' +
                        Math.round(a[1]+(b[1]-a[1])*t) + ',' +
                        Math.round(a[2]+(b[2]-a[2])*t) + ')';
      }
    }
    return 'rgb(' + PROG_CS[PROG_CS.length-1][1].join(',') + ')';
  }

  plotDiv.on('plotly_unhover', function() {
    overlay.style.display = 'none';
    dimmer.style.display = 'none';
    dot.style.display = 'none';
  });

  // ── Legend glyph styling per mode ─────────────────────────────────────────
  // Plotly draws the glyph from the trace's marker.color: arrays of strings
  // (terminal) give a neutral glyph, numeric arrays (progress) a colorscale
  // color. Override per mode: task colors normally, text-only in progress.
  var TASK_COLORS = {"reach bottle cap": "#1a7a52", "grasp bottle cap": "#b06010", "reach bottle": "#6a28a0", "align bottle cap": "#0f8a8a", "slide bottle cap": "#c04455", "final twist": "#8a8a0f"};
  var currentMode = 'Color: GT progress';

  function styleLegend() {
    var isProg = currentMode.indexOf('progress') !== -1;
    plotDiv.querySelectorAll('g.traces').forEach(function(g) {
      var txt  = g.querySelector('.legendtext');
      var name = txt ? txt.textContent.trim() : '';
      g.querySelectorAll('.legendpoints path').forEach(function(p) {
        if (isProg) {
          p.style.opacity = 0;
        } else {
          p.style.opacity = 1;
          var c = TASK_COLORS[name];
          if (c) { p.style.fill = c; p.style.fillOpacity = 1; p.style.stroke = 'none'; }
        }
      });
    });
  }

  plotDiv.on('plotly_buttonclicked', function(d) {
    if (d.button && d.button.label) currentMode = d.button.label;
    setTimeout(styleLegend, 50);
  });
  // Legend re-renders on item clicks/restyles — re-apply styling
  plotDiv.on('plotly_restyle',      function() { setTimeout(styleLegend, 30); });
  plotDiv.on('plotly_legendclick',  function() { setTimeout(styleLegend, 60); return true; });
  setTimeout(styleLegend, 100);

  // ── postMessage bridge (triggered by compositor toolbar) ──────────────────
  window.addEventListener('message', function(e) {
    if (!e.data || e.data.action !== 'setMode') return;
    var label = e.data.mode;
    var menus = (plotDiv.layout || {}).updatemenus || [];
    for (var mi = 0; mi < menus.length; mi++) {
      var btns = menus[mi].buttons || [];
      for (var bi = 0; bi < btns.length; bi++) {
        if (btns[bi].label === label) {
          Plotly.restyle(plotDiv, btns[bi].args[0]);
          currentMode = label;
          setTimeout(styleLegend, 50);
          return;
        }
      }
    }
  });

})();
</script>

  rotBtn.addEventListener('click', function() {
    userStopped = !userStopped;
    if (userStopped) {
      pause();
      rotBtn.innerHTML = PLAY_ICON;
    } else {
      adoptCamera();
      rotating = true;
      rotBtn.innerHTML = PAUSE_ICON;
    }
  });
  plotDiv.style.position = 'relative';
  plotDiv.appendChild(rotBtn);

  var dragging = false;
  plotDiv.addEventListener('mousedown', function(e) {
    if (e.target.closest('.gl-container')) { dragging = true; pause(); }
  });
  document.addEventListener('mouseup', function() {
    if (dragging) { dragging = false; scheduleResume(); }
  });
  plotDiv.addEventListener('wheel', function(e) {
    if (e.target.closest('.gl-container')) { pause(); scheduleResume(); }
  }, {passive: true});

  // Pause while hovering a point (so the thumbnail can be inspected),
  // resume shortly after the cursor leaves it.
  plotDiv.on('plotly_hover',   function() { pause(); });
  plotDiv.on('plotly_unhover', function() { scheduleResume(); });

  var DEG_PER_SEC = 30;
  var lastT = null;
  (function step(t) {
    if (lastT !== null && rotating) {
      angle += DEG_PER_SEC * (t - lastT) / 1000;
      var r = angle * Math.PI / 180;
      Plotly.relayout(plotDiv, {'scene.camera': {eye: {x: radius*Math.cos(r), y: radius*Math.sin(r), z: eyeZ}}});
    }
    lastT = t;
    requestAnimationFrame(step);
  })(performance.now());
})();
</script>
</body>
</html>
